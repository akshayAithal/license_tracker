version: '3.8'

# =============================================================================
# LICENSE TRACKER - DOCKER COMPOSE
# =============================================================================
# All configuration is loaded from .env file
# Copy .env.example to .env and configure your values
# =============================================================================

services:
  db:
    image: mysql:8.0
    container_name: license_tracker_db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-license_tracker}
      MYSQL_USER: ${MYSQL_USER:-license_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-license_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
    container_name: license_tracker_backend
    restart: always
    ports:
      - "${BACKEND_PORT:-2324}:${BACKEND_PORT:-2324}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./instance:/opt/license_tracker/instance
      # Mount .env file into instance folder for python-dotenv to read
      - ./.env:/opt/license_tracker/instance/.env:ro
      # Mount SSL certificates directory (create ./certs folder with your certs)
      - ./certs:/opt/license_tracker/certs:ro
    networks:
      - backend-network
      - frontend-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
    container_name: license_tracker_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    env_file:
      - .env
    environment:
      - PORT=${FRONTEND_PORT:-3000}
      - BACKEND_URL=${BACKEND_URL:-http://backend:2324}
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      - backend
    networks:
      - frontend-network

networks:
  backend-network:
    driver: bridge
    internal: true
  frontend-network:
    driver: bridge

volumes:
  mysql_data:
