version: '3.8'

# =============================================================================
# LICENSE TRACKER - DOCKER COMPOSE
# =============================================================================
# All configuration is loaded from .env file
# Copy .env.example to .env and configure your values
# =============================================================================

services:
  db:
    image: mysql:8.0
    container_name: license_tracker_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: license_tracker
      MYSQL_USER: license_user
      MYSQL_PASSWORD: license_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysql", "-u", "license_user", "-plicense_password", "-e", "SELECT 1 FROM license_tracker.local_users LIMIT 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - backend-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: license_tracker_backend
    restart: always
    ports:
      - "2324:2324"
    environment:
      SQLALCHEMY_DATABASE_URI: mysql+pymysql://license_user:license_password@db:3306/license_tracker
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "2324"
      CFG_LOCATION: /opt/license_tracker/instance/config.py
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      GUNICORN_WORKERS: "10"
      GUNICORN_TIMEOUT: "240"
      GUNICORN_LOG_LEVEL: debug
      SSL_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./instance:/opt/license_tracker/instance
      - ./certs:/opt/license_tracker/certs:ro
    networks:
      - backend-network
      - frontend-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: license_tracker_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BACKEND_URL=http://backend:2324
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - frontend-network

networks:
  backend-network:
    driver: bridge
    internal: true
  frontend-network:
    driver: bridge

volumes:
  mysql_data:
